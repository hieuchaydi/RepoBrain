name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish package to PyPI after build"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build release artifact
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            webapp/package-lock.json
            docs-for-repobrain/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install frontend dependencies
        working-directory: webapp
        run: npm ci

      - name: Build frontend assets
        working-directory: webapp
        run: npm run build

      - name: Install docs frontend dependencies
        working-directory: docs-for-repobrain
        run: npm ci

      - name: Lint docs frontend
        working-directory: docs-for-repobrain
        run: npm run lint

      - name: Build docs frontend
        working-directory: docs-for-repobrain
        run: npm run build

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m pip install -e ".[dev,tree-sitter,mcp]"

      - name: Compile package
        run: python -m compileall src

      - name: Build wheel and sdist
        run: python -m build

      - name: Inspect release artifacts
        run: python -m repobrain.cli release-check --repo . --require-dist --format text

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: repobrain-dist
          path: dist/*

      - name: Upload docs frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: repobrain-docs-frontend
          path: docs-for-repobrain/dist

      - name: Publish to PyPI
        if: ${{ inputs.publish == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
